name: Mobile app checks

on:
  push:
    paths:
      - 'mobile/**'
  pull_request:
    paths:
      - 'mobile/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # Signed Android/iOS builds are commented out until the app is registered
  # in Firebase (google-services.json / GoogleService-Info.plist) and the
  # Apple/Google Play signing secrets exist in this repo's settings — see
